<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
    <!-- 8x8 pixel grid representing letter "A" -->
    <!-- Row 0: empty -->
    <!-- Row 1: cols 2,3 -->
    <rect x="30" y="20" width="10" height="10" fill="#4caf50"/>
    <rect x="40" y="20" width="10" height="10" fill="#4caf50"/>
    <!-- Row 2: cols 1,4 -->
    <rect x="20" y="30" width="10" height="10" fill="#4caf50"/>
    <rect x="50" y="30" width="10" height="10" fill="#4caf50"/>
    <!-- Row 3: cols 1,2,3,4 (crossbar) -->
    <rect x="20" y="40" width="10" height="10" fill="#4caf50"/>
    <rect x="30" y="40" width="10" height="10" fill="#4caf50"/>
    <rect x="40" y="40" width="10" height="10" fill="#4caf50"/>
    <rect x="50" y="40" width="10" height="10" fill="#4caf50"/>
    <!-- Row 4: cols 1,4 -->
    <rect x="20" y="50" width="10" height="10" fill="#4caf50"/>
    <rect x="50" y="50" width="10" height="10" fill="#4caf50"/>
    <!-- Row 5: cols 1,4 -->
    <rect x="20" y="60" width="10" height="10" fill="#4caf50"/>
    <rect x="50" y="60" width="10" height="10" fill="#4caf50"/>
    <!-- Row 6: empty -->
    <!-- Row 7: empty -->

    <!-- Pixel grid overlay (subtle) -->
    <line x1="20" y1="10" x2="20" y2="90" stroke="#333" stroke-width="0.5"/>
    <line x1="30" y1="10" x2="30" y2="90" stroke="#333" stroke-width="0.5"/>
    <line x1="40" y1="10" x2="40" y2="90" stroke="#333" stroke-width="0.5"/>
    <line x1="50" y1="10" x2="50" y2="90" stroke="#333" stroke-width="0.5"/>
    <line x1="60" y1="10" x2="60" y2="90" stroke="#333" stroke-width="0.5"/>
    <line x1="70" y1="10" x2="70" y2="90" stroke="#333" stroke-width="0.5"/>
    <line x1="80" y1="10" x2="80" y2="90" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="20" x2="90" y2="20" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="30" x2="90" y2="30" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="40" x2="90" y2="40" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="50" x2="90" y2="50" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="60" x2="90" y2="60" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="70" x2="90" y2="70" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="80" x2="90" y2="80" stroke="#333" stroke-width="0.5"/>
</svg>
