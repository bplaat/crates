services:
  plaatdeploy:
    image: ghcr.io/bplaat/plaatdeploy:latest
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SERVER_ORIGIN: https://apps.bplaat.nl
    networks:
      - plaatdeploy

networks:
  plaatdeploy:
    name: plaatdeploy
    driver: bridge
