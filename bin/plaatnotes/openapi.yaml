openapi: 3.0.0
info:
  title: PlaatNotes API
  description: A simple note-taking app
  version: 0.1.3

servers:
  - url: http://localhost:8080

paths:
  # MARK: Misc
  /api:
    get:
      tags: [Misc]
      summary: Home route
      responses:
        '200':
          description: Name and version of the API
          content:
            text/plain:
              schema:
                type: string

  # MARK: Auth
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and create a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request. Validation errors return a Report; malformed form data returns an empty body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Invalid credentials
        '429':
          description: Too many login attempts from the current IP address
        '500':
          description: Internal server error while verifying the stored password hash

  /api/auth/validate:
    get:
      tags: [Auth]
      summary: Validate current session
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Session is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthValidateResponse'
        '401':
          description: Unauthorized

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and expire current session
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Logout successful
        '401':
          description: Unauthorized

  # MARK: Sessions
  /api/sessions:
    get:
      tags: [Sessions]
      summary: Get all sessions (admin only)
      description: >
        Returns all sessions across all users. Admin only; normal users should use
        `/users/{id}/sessions` to view their own sessions.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Sessions retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionIndexResponse'
        '400':
          description: Invalid request. Validation errors return a Report; malformed query parameters return an empty body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (admin only)

  /api/sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Get session details
      security:
        - BearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Session not found
    delete:
      tags: [Sessions]
      summary: Delete (revoke) a session
      security:
        - BearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session deleted
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Session not found

  # MARK: Users
  /api/users:
    get:
      tags: [Users]
      summary: Get all users
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserIndexResponse'
        '400':
          description: Invalid request. Validation errors return a Report; malformed query parameters return an empty body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (admin only)
    post:
      tags: [Users]
      summary: Create a new user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreateBody'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request. Validation errors return a Report; malformed form data returns an empty body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (admin only)

  /api/users/{userId}:
    get:
      tags: [Users]
      summary: Get a user by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: A single user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
    put:
      tags: [Users]
      summary: Update a user by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserUpdateBody'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request. Invalid path UUID returns an empty body; validation errors return a Report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
    delete:
      tags: [Users]
      summary: Delete a user by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: User deleted
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found

  /api/users/{userId}/change-password:
    post:
      tags: [Users]
      summary: Change user password
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserChangePasswordBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserChangePasswordBody'
      responses:
        '204':
          description: Password changed successfully
        '400':
          description: Invalid request. Invalid path UUID returns an empty body; validation errors return a Report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized or old password is incorrect
        '403':
          description: Forbidden
        '404':
          description: User not found
        '500':
          description: Internal server error while verifying the stored password hash

  /api/users/{userId}/notes:
    get:
      tags: [Users]
      summary: Get all notes for a user
      description: >
        Returns active notes for the specified user: non-trashed, non-archived, and non-pinned.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A list of active notes for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteIndexResponse'
        '400':
          description: Invalid request. Invalid path UUID returns an empty body; validation errors return a Report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (user can only see their own notes)
        '404':
          description: User not found
    post:
      tags: [Users]
      summary: Create a new note for a user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteCreateBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NoteCreateBody'
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Invalid request. Validation errors return a Report; malformed form data returns an empty body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (user can only create notes for themselves)
        '404':
          description: User not found

  /api/users/{userId}/notes/pinned:
    get:
      tags: [Users]
      summary: Get all pinned notes for a user
      description: >
        Returns only pinned, non-trashed notes for the specified user.
        Pinned notes are excluded from the main `/users/{id}/notes` index.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A list of pinned notes for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteIndexResponse'
        '400':
          description: Invalid request. Invalid path UUID returns an empty body; validation errors return a Report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (user can only see their own notes)
        '404':
          description: User not found

  /api/users/{userId}/notes/archived:
    get:
      tags: [Users]
      summary: Get all archived notes for a user
      description: >
        Returns only archived, non-trashed notes for the specified user.
        Archived notes are excluded from the main `/users/{id}/notes` index.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A list of archived notes for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteIndexResponse'
        '400':
          description: Invalid request. Invalid path UUID returns an empty body; validation errors return a Report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (user can only see their own notes)
        '404':
          description: User not found

  /api/users/{userId}/notes/trashed:
    get:
      tags: [Users]
      summary: Get all trashed notes for a user
      description: >
        Returns only trashed notes for the specified user.
        Trashed notes are excluded from all other note index endpoints until permanently deleted.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A list of trashed notes for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteIndexResponse'
        '400':
          description: Invalid request. Invalid path UUID returns an empty body; validation errors return a Report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (user can only see their own notes)
        '404':
          description: User not found

  /api/users/{userId}/notes/trashed/clear:
    delete:
      tags: [Users]
      summary: Clear all trashed notes for a user
      description: >
        Permanently deletes all trashed notes for the specified user.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: All trashed notes deleted successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (user can only clear their own trashed notes)
        '404':
          description: User not found

  /api/users/{userId}/notes/reorder:
    put:
      tags: [Users]
      summary: Reorder normal notes for a user
      description: >
        Reorders the normal notes list for the specified user.
        Only affects notes that are not pinned, archived, or trashed.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteReorderBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NoteReorderBody'
      responses:
        '204':
          description: Notes reordered successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (user can only reorder their own notes)
        '404':
          description: User not found

  /api/users/{userId}/notes/pinned/reorder:
    put:
      tags: [Users]
      summary: Reorder pinned notes for a user
      description: >
        Reorders the pinned notes list for the specified user.
        Only affects notes where is_pinned=true and is_trashed=false.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteReorderBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NoteReorderBody'
      responses:
        '204':
          description: Pinned notes reordered successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (user can only reorder their own notes)
        '404':
          description: User not found

  /api/users/{userId}/notes/archived/reorder:
    put:
      tags: [Users]
      summary: Reorder archived notes for a user
      description: >
        Reorders the archived notes list for the specified user.
        Only affects notes where is_archived=true and is_trashed=false.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteReorderBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NoteReorderBody'
      responses:
        '204':
          description: Archived notes reordered successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (user can only reorder their own notes)
        '404':
          description: User not found

  /api/users/{userId}/sessions:
    get:
      tags: [Users]
      summary: Get all active sessions for a user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A list of sessions for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionIndexResponse'
        '400':
          description: Invalid request. Validation errors return a Report; malformed query parameters return an empty body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found

  # MARK: Notes
  /api/notes:
    get:
      tags: [Notes]
      summary: Get all notes across all users (admin only)
      description: >
        Returns active notes across all users: non-trashed, non-archived, and non-pinned.
        Admin only; normal users should use `/users/{id}/notes` to view their own notes.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A list of active notes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteIndexResponse'
        '400':
          description: Invalid request. Validation errors return a Report; malformed query parameters return an empty body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (admin only)
    post:
      tags: [Notes]
      summary: Create a note for any user (admin only)
      description: >
        Creates a note for the specified user.
        Admin only; normal users should use `POST /users/{userId}/notes`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteAdminCreateBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NoteAdminCreateBody'
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Invalid request. Validation errors return a Report; malformed form data returns an empty body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (admin only)
        '404':
          description: Target user not found

  /api/notes/{noteId}:
    get:
      tags: [Notes]
      summary: Get a note by ID
      description: >
        Returns a note if the authenticated user has access.
        Admins can access any note; normal users can only access their own.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NoteId'
      responses:
        '200':
          description: A single note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Note not found
    put:
      tags: [Notes]
      summary: Update a note by ID
      description: >
        Updates a note if the authenticated user has access.
        Admins can update any note; normal users can only update their own.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NoteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteUpdateBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NoteUpdateBody'
      responses:
        '200':
          description: Note updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Invalid request. Validation errors return a Report; malformed form data returns an empty body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Note not found
    delete:
      tags: [Notes]
      summary: Delete a note by ID
      description: >
        Deletes a note if the authenticated user has access.
        Admins can delete any note; normal users can only delete their own.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NoteId'
      responses:
        '204':
          description: Note deleted
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Note not found

  # MARK: Imports
  /api/imports/google-keep:
    post:
      tags: [Imports]
      summary: Import notes from a Google Keep Takeout zip archive
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/zip:
            schema:
              type: string
              format: binary
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Import successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportGoogleKeepResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          description: Unauthorized

components:
  # MARK: Security
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token

  # MARK: Parameters
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Query:
      name: q
      in: query
      required: false
      schema:
        type: string

    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20

  # MARK: Schemas
  schemas:
    Report:
      type: object
      additionalProperties:
        type: array
        items:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
      required:
        - page
        - limit
        - total

    # MARK: Models
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        theme:
          $ref: '#/components/schemas/UserTheme'
        language:
          type: string
          description: ISO 639-1 language code
        role:
          $ref: '#/components/schemas/UserRole'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - email
        - theme
        - language
        - role
        - createdAt
        - updatedAt

    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        ip:
          $ref: '#/components/schemas/SessionIp'
        client:
          $ref: '#/components/schemas/SessionClient'
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - ip
        - client
        - expiresAt
        - createdAt
        - updatedAt

    SessionIp:
      type: object
      properties:
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        country:
          type: string
          nullable: true
        city:
          type: string
          nullable: true

    SessionClient:
      type: object
      properties:
        name:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        os:
          type: string
          nullable: true

    UserTheme:
      type: string
      enum: [system, light, dark]

    UserRole:
      type: string
      enum: [normal, admin]

    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        body:
          type: string
        isPinned:
          type: boolean
        isArchived:
          type: boolean
        isTrashed:
          type: boolean
        position:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - body
        - isPinned
        - isArchived
        - isTrashed
        - position
        - createdAt
        - updatedAt

    # MARK: Bodies
    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
          pattern: "^[\\x00-\\x7F]+$"
          description: ASCII-only password
      required:
        - email
        - password

    UserCreateBody:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 128
        lastName:
          type: string
          minLength: 1
          maxLength: 128
        email:
          type: string
          format: email
          description: Must be unique across all users
        password:
          type: string
          minLength: 8
          maxLength: 128
          pattern: "^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[^A-Za-z0-9])[\\x00-\\x7F]+$"
          description: ASCII-only password that must contain uppercase, lowercase, digit, and special character
        role:
          $ref: '#/components/schemas/UserRole'
      required:
        - firstName
        - lastName
        - email
        - password
        - role

    UserUpdateBody:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 128
        lastName:
          type: string
          minLength: 1
          maxLength: 128
        email:
          type: string
          format: email
          description: Must be unique across all users (or unchanged from current value)
        password:
          type: string
          minLength: 8
          maxLength: 128
          pattern: "^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[^A-Za-z0-9])[\\x00-\\x7F]+$"
          description: >
            Optional new ASCII-only password. Only processed when the authenticated user has the admin role;
            silently ignored for normal users. Must contain uppercase, lowercase, digit, and special character.
            Use `/change-password` to change your own password.
        theme:
          $ref: '#/components/schemas/UserTheme'
        language:
          type: string
        role:
          # Only applied when the authenticated user has the admin role; ignored for normal users.
          $ref: '#/components/schemas/UserRole'
      required:
        - firstName
        - lastName
        - email
        - theme
        - language
        - role

    UserChangePasswordBody:
      type: object
      properties:
        oldPassword:
          type: string
          minLength: 8
          maxLength: 128
          pattern: "^[\\x00-\\x7F]+$"
          description: Current ASCII-only password
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
          pattern: "^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[^A-Za-z0-9])[\\x00-\\x7F]+$"
          description: New ASCII-only password that must contain uppercase, lowercase, digit, and special character
      required:
        - oldPassword
        - newPassword

    NoteCreateBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
        isPinned:
          type: boolean
      required:
        - body

    NoteAdminCreateBody:
      type: object
      properties:
        userId:
          type: string
          format: uuid
          description: ID of the user the note should be created for
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
        isPinned:
          type: boolean
      required:
        - userId
        - body

    NoteUpdateBody:
      type: object
      properties:
        userId:
          type: string
          format: uuid
          description: Admin only; reassign note to a different user
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
        isPinned:
          type: boolean
        isArchived:
          type: boolean
        isTrashed:
          type: boolean
      required:
        - body
        - isPinned
        - isArchived
        - isTrashed

    NoteReorderBody:
      type: object
      properties:
        ids:
          type: array
          description: Ordered list of note UUIDs
          items:
            type: string
            format: uuid
      required:
        - ids

    ImportGoogleKeepResponse:
      type: object
      properties:
        count:
          type: integer
          description: Number of notes imported
      required:
        - count

    # MARK: Responses
    LoginResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        token:
          type: string
      required:
        - userId
        - token

    AuthValidateResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        session:
          $ref: '#/components/schemas/Session'
      required:
        - user
        - session

    UserIndexResponse:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
      required:
        - pagination
        - data

    SessionIndexResponse:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Session'
      required:
        - pagination
        - data

    NoteIndexResponse:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Note'
      required:
        - pagination
        - data
