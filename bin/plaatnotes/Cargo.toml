[package]
name = "plaatnotes"
version = "0.1.3"
edition.workspace = true
license.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
anyhow = "1"
base64 = "0.22"
bsqlite = { version = "0.1.2", features = ["uuid", "chrono"] }
chrono = { version = "0.4", default-features = false, features = [
    "now",
    "serde",
] }
clap = "4"
const_format = "0.2"
getrandom = "0.3"
dotenv = "0.15.0"
from_derive = { path = "../../lib/from_derive" }
log = "0.4.28"
mime_guess = { version = "2.0", default-features = false }
pbkdf2 = { path = "../../lib/pbkdf2" }
rust-embed = { version = "8.7", features = ["interpolate-folder-path"] }
serde = { version = "1.0", features = ["derive"] }
simple-useragent = { version = "0.1.2", features = ["serde"] }
serde_json = "1.0"
serde_urlencoded = "0.7.1"
simple_logger = "5.0.0"
small-http = { version = "0.2.1", features = ["json", "log"] }
small-router = { version = "0.2.1", features = ["log"] }
uuid = { version = "1.0", features = ["v7", "serde"] }
validate = { path = "../../lib/validate" }
zip = "8.1"

[target.'cfg(not(target_os = "macos"))'.dependencies]
bsqlite = { version = "0.1.2", features = ["uuid", "chrono", "bundled"] }

[build-dependencies]
base64 = "0.22"
copy_dir = "0.1.3"
openapi-generator = { path = "../../lib/openapi-generator" }
pbkdf2 = { path = "../../lib/pbkdf2" }
