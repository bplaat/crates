[package]
name = "bimg"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true

[package.metadata]
platforms = ["macos"]

[package.metadata.bundle]
name = "BImg"
identifier = "nl.bplaat.BImg"
copyright = "Copyright (c) 2026 Bastiaan van der Plaat"
icon = "meta/macos/icon.icon"
entitlements = "meta/macos/Entitlements.plist"

[[package.metadata.bundle.plugins]]
name = "BImgQLPreview"
identifier = "nl.bplaat.BImg.QLPreview"
binary = "bimg-ql-preview"
info_plist = "meta/macos/ql_preview/Info.plist"
entitlements = "meta/macos/ql_preview/Entitlements.plist"

[[package.metadata.bundle.plugins]]
name = "BImgQLThumbnail"
identifier = "nl.bplaat.BImg.QLThumbnail"
binary = "bimg-ql-thumbnail"
info_plist = "meta/macos/ql_thumbnail/Info.plist"
entitlements = "meta/macos/ql_thumbnail/Entitlements.plist"

[[bin]]
name = "bimg"
path = "src/main.rs"

[[bin]]
name = "bimg-ql-preview"
path = "src/ql_preview.rs"

[[bin]]
name = "bimg-ql-thumbnail"
path = "src/ql_thumbnail.rs"

[lints]
workspace = true

[dependencies]
block2 = { path = "../../lib/block2" }
objc2 = { path = "../../lib/objc2" }
qoi = { path = "../../lib/qoi" }
