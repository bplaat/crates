<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Todo App</title>
        <style>
            [v-cloak] {
                display: none;
            }
        </style>
        <link rel="stylesheet" href="/index.css" />
    </head>
    <body>
        <div id="app" class="app section" v-cloak @vue:mounted="loadTodos">
            <h1 class="title">Todo App</h1>
            <form class="field has-addons" @submit="addTodo">
                <input class="input" type="text" v-model="input" placeholder="Add a todo" />
                <button class="button is-primary" type="submit">Add</button>
                <button class="button" type="button" @click="removeCompleted" :disabled="todos.length === 0">
                    Clear done
                </button>
            </form>

            <p v-if="todos.length === 0" class="placeholder">
                <i>No todos yet!</i>
            </p>
            <ul v-else>
                <li
                    v-for="(todo, index) in todos"
                    :key="todo.id"
                    :class="{ 'is-completed': todo.completed }"
                    @click="completeTodo(index, !todo.completed)"
                >
                    <input
                        type="checkbox"
                        :checked="todo.completed"
                        @change="completeTodo(index, $event.target.checked)"
                    />
                    {{ todo.text }}
                </li>
            </ul>
        </div>

        <script src="/petite-vue.min.js"></script>
        <script src="/index.js"></script>
    </body>
</html>
