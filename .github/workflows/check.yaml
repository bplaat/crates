name: check

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # MARK: Check shared
  check-shared:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install packages and extra Rust tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-20
          sudo rm -f /usr/bin/clang-format
          sudo ln -s /usr/bin/clang-format-20 /usr/bin/clang-format
          clang-format --version
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y --locked cargo-deny
      - run: ./meta.sh check-shared

  # MARK: Check rust
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-24.04
            cache-key: linux-x86_64
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
            cache-key: linux-aarch64
          # FIXME: Uncomment when https://github.com/cargo-bins/cargo-binstall/issues/2522 is fixed
          # - name: Linux riscv64
          #   runner: ubuntu-24.04-riscv
          #   cache-key: linux-riscv64
          - name: macOS aarch64
            runner: macos-15
            cache-key: macos-aarch64
          - name: Windows x86_64
            runner: windows-2025
            cache-key: windows-x86_64
          - name: Windows aarch64
            runner: windows-11-arm
            cache-key: windows-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install packages (Linux x86_64/aarch64)
        if: runner.os == 'Linux' && !contains(matrix.runner, 'riscv')
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind libcunit1-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install packages (Linux riscv64)
        if: runner.os == 'Linux' && contains(matrix.runner, 'riscv')
        run: |
          sudo apt-get update
          sudo apt-get install -y libcunit1-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install packages (macos)
        if: runner.os == 'macOS'
        run: |
          brew install cunit

      - name: Setup Xcode (macos)
        uses: maxim-lobanov/setup-xcode@v1
        if: runner.os == 'macOS'
        with:
          xcode-version: latest-stable

      - uses: actions/cache@v4
        id: cache-rust-toolchain
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: ${{ matrix.cache-key }}-rust-with-tools-toolchain

      - name: Install extra Rust tooling (unix)
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: |
          rustup toolchain add nightly --component rustfmt
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y --locked cargo-nextest

      - name: Install extra Rust tooling (windows)
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true' && runner.os == 'Windows'
        run: |
          rustup toolchain add nightly --component rustfmt
          iex (iwr "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1").Content
          cargo binstall -y --locked cargo-nextest

      - run: ./meta.sh check-rust
        shell: bash

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests (${{ matrix.name }})
          path: target/nextest/ci/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  # MARK: Check e2e
  check-e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        id: cache-rust-toolchain
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: linux-x86_64-rust-with-tools-toolchain
      - name: Install extra Rust tooling
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true'
        run: |
          rustup toolchain add nightly --component rustfmt
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y --locked cargo-deny cargo-nextest
      - run: ./meta.sh check-e2e
      - name: Report E2E test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Tests
          path: bin/plaatnotes/web/test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'false'
