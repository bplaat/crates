name: check-build-deploy

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  checks: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # MARK: Linux x86_64
  check-linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Debian packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libcunit1-dev libgtk-3-dev libwebkit2gtk-4.1-dev valgrind
      - uses: actions/cache@v4
        id: cache-rust-toolchain
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: linux-x86_64-rust-with-tools-toolchain
      - name: Install extra Rust tooling
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true'
        run: |
          rustup toolchain add nightly --component rustfmt
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y cargo-deny cargo-nextest
      - run: ./meta.sh check-rust
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests (Linux x86_64)
          path: target/nextest/ci/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  # MARK: Linux aarch64
  check-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install Debian packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libcunit1-dev libgtk-3-dev libwebkit2gtk-4.1-dev valgrind
      - uses: actions/cache@v4
        id: cache-rust-toolchain
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: linux-aarch64-rust-with-tools-toolchain
      - name: Install extra Rust tooling
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true'
        run: |
          rustup toolchain add nightly --component rustfmt
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y cargo-deny cargo-nextest
      - run: ./meta.sh check-rust
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests (Linux aarch64)
          path: target/nextest/ci/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  # MARK: macOS aarch64
  check-macos-aarch64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install brew packages
        run: |
          brew install cunit clang-format
      - uses: actions/cache@v4
        id: cache-rust-toolchain
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: macos-aarch64-rust-with-tools-toolchain
      - name: Install extra Rust tooling
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true'
        run: |
          rustup toolchain add nightly --component rustfmt
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y cargo-deny cargo-nextest
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: ./meta.sh check-rust
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests (macOS aarch64)
          path: target/nextest/ci/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  # MARK: Windows x86_64
  check-windows-x86_64:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        id: cache-rust-toolchain
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: windows-x86_64-rust-with-tools-toolchain
      - name: Install extra Rust tooling
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true'
        run: |
          rustup toolchain add nightly --component rustfmt
          iex (iwr "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1").Content
          cargo binstall -y cargo-deny cargo-nextest
      - run: ./meta.sh check-rust
        shell: bash
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests (Windows x86_64)
          path: target/nextest/ci/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  # MARK: Windows aarch64
  check-windows-aarch64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        id: cache-rust-toolchain
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: windows-aarch64-rust-with-tools-toolchain
      - name: Install extra Rust tooling
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true'
        run: |
          rustup toolchain add nightly --component rustfmt
          iex (iwr "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1").Content
          cargo binstall -y cargo-deny cargo-nextest
      - run: ./meta.sh check-rust
        shell: bash
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests (Windows aarch64)
          path: target/nextest/ci/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  # MARK: End-to-end
  check-e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        id: cache-rust-toolchain
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: linux-x86_64-rust-with-tools-toolchain
      - name: Install extra Rust tooling
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true'
        run: |
          rustup toolchain add nightly --component rustfmt
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y cargo-deny cargo-nextest
      - run: ./meta.sh check-e2e
      - name: Report E2E test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Tests
          path: bin/plaatnotes/web/test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  # MARK: Build deploy pages
  build-deploy-pages:
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - check-linux-x86_64
      - check-linux-aarch64
      - check-macos-aarch64
      - check-windows-x86_64
      - check-windows-aarch64
      - check-e2e
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        id: cache-rust-toolchain
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: build-deploy-pages-rust-with-tools-toolchain
      - name: Install extra Rust tooling
        if: steps.cache-rust-toolchain.outputs.cache-hit != 'true'
        run: |
          rustup target add wasm32-unknown-unknown
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y wasm-bindgen-cli --version 0.2.104
      - name: Build pages
        run: ./meta.sh build-pages
      - name: Upload pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './target/pages'
      - id: deployment
        name: Deploy pages
        uses: actions/deploy-pages@v4
